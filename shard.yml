name: ldap-server
version: 0.3.0

description: |
  Crystal library for building LDAP servers. Handles BER/ASN.1 framing,
  message dispatch, and response encoding. Implement Handler#on_bind and
  #on_search to back it with your own directory logic.

authors:
  - Dirless <info@dirless.com>

homepage: https://github.com/dirless/ldap-server.cr

source_url: https://github.com/dirless/ldap-server.cr

license: Apache-2.0

crystal: ">= 1.9.0"

dependencies:
  ldap:
    github: dirless/crystal-ldap
    version: "~> 0.10.0"

development_dependencies:
  ameba:
    github: crystal-ameba/ameba
